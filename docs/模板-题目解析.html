<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>文档标题 - 知识卡片</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@300;400;500;700;900&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="../assets/css/styles.css">
    <style>
        /* 题目解析模板专用样式 */
        .question-card {
            background: var(--card-bg);
            border-radius: 12px;
            padding: 20px;
            margin-bottom: 20px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.08);
            border: 1px solid var(--border-color);
        }

        .question-header {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            margin-bottom: 16px;
            gap: 12px;
        }

        .question-number {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 14px;
            font-weight: 600;
            white-space: nowrap;
        }

        .question-tags {
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
        }

        .question-title {
            font-size: 16px;
            font-weight: 600;
            color: var(--text-primary);
            margin-bottom: 16px;
            line-height: 1.6;
        }

        .options-list {
            margin: 12px 0;
            padding-left: 0;
            list-style: none;
        }

        .option-item {
            display: flex;
            align-items: flex-start;
            padding: 10px 14px;
            margin-bottom: 8px;
            background: var(--bg-secondary);
            border-radius: 8px;
            font-size: 14px;
            line-height: 1.5;
            border: 1px solid transparent;
            transition: all 0.2s;
        }

        .option-item:hover {
            border-color: var(--primary-color);
            background: var(--bg-hover);
        }

        .option-item.correct {
            background: linear-gradient(135deg, #11998e 0%, #38ef7d 100%);
            color: white;
            border-color: #11998e;
        }

        .option-label {
            font-weight: 700;
            margin-right: 10px;
            min-width: 24px;
        }

        .option-text {
            flex: 1;
        }

        .answer-section {
            margin-top: 16px;
            padding: 16px;
            background: linear-gradient(135deg, #f5f7fa 0%, #e4e8ec 100%);
            border-radius: 10px;
            border-left: 4px solid #667eea;
        }

        .answer-label {
            font-weight: 700;
            color: #667eea;
            margin-bottom: 8px;
            font-size: 14px;
        }

        .answer-content {
            font-size: 15px;
            color: var(--text-primary);
        }

        .answer-content strong {
            color: #11998e;
        }

        .analysis-section {
            margin-top: 12px;
            padding-top: 12px;
            border-top: 1px dashed var(--border-color);
        }

        .analysis-label {
            font-weight: 600;
            color: #764ba2;
            margin-bottom: 6px;
            font-size: 13px;
        }

        .analysis-content {
            font-size: 14px;
            color: var(--text-secondary);
            line-height: 1.6;
        }

        .key-point {
            color: #e74c3c;
            font-weight: 600;
            background: #fde8e7;
            padding: 2px 6px;
            border-radius: 4px;
        }

        /* 判断题专用样式 */
        .judgment-options {
            display: flex;
            gap: 12px;
            margin: 12px 0;
        }

        .judgment-option {
            flex: 1;
            padding: 12px 20px;
            text-align: center;
            background: var(--bg-secondary);
            border-radius: 8px;
            font-weight: 600;
            border: 2px solid transparent;
            transition: all 0.2s;
        }

        .judgment-option.correct {
            background: linear-gradient(135deg, #11998e 0%, #38ef7d 100%);
            color: white;
            border-color: #11998e;
        }

        /* 多选题专用样式 */
        .multi-select-hint {
            display: inline-block;
            background: linear-gradient(135deg, #f093fb 0%, #f5576c 100%);
            color: white;
            padding: 2px 10px;
            border-radius: 12px;
            font-size: 12px;
            font-weight: 600;
            margin-bottom: 12px;
        }
    </style>
</head>
<body>
    <div class="app-container">
        <aside class="sidebar" id="sidebar">
            <!-- Logo -->
            <div class="logo">
                <div class="logo-icon">📚</div>
                <div>
                    <div class="logo-text">文档标题</div>
                    <div class="logo-sub">知识卡片</div>
                </div>
            </div>

            <!-- 搜索框 -->
            <div class="search-container">
                <svg class="search-icon" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <circle cx="11" cy="11" r="8"></circle>
                    <path d="m21 21-4.35-4.35"></path>
                </svg>
                <input type="text" class="search-input" placeholder="搜索知识点..." id="searchInput">
            </div>

            <!-- 快速导航 -->
            <nav class="nav-section">
                <div class="nav-title">快速导航</div>
                <a href="../index.html" class="nav-item">
                    <span>🏠</span>
                    <span>返回首页</span>
                </a>
            </nav>

            <!-- 章节导航 - 根据实际章节修改 -->
            <nav class="nav-section">
                <div class="nav-title">章节导航</div>
                <div class="nav-item active" data-chapter="all">
                    <span>📖</span>
                    <span>全部章节</span>
                    <span class="nav-item-badge">N</span>
                </div>
                <div class="nav-item" data-chapter="ch1">
                    <span>🏷️</span>
                    <span>第一章 章节标题</span>
                    <span class="nav-item-badge">N</span>
                </div>
                <div class="nav-item" data-chapter="ch2">
                    <span>🏷️</span>
                    <span>第二章 章节标题</span>
                    <span class="nav-item-badge">N</span>
                </div>
            </nav>

            <!-- 学习进度统计 -->
            <div class="stats-card">
                <div class="stats-title">📊 学习进度</div>
                <div class="stats-grid">
                    <div class="stats-item">
                        <div class="stats-number" id="totalCards">0</div>
                        <div class="stats-label">知识点</div>
                    </div>
                    <div class="stats-item">
                        <div class="stats-number" id="rememberedCards">0</div>
                        <div class="stats-label">已掌握</div>
                    </div>
                </div>
            </div>
        </aside>

        <main class="main-content">
            <!-- 顶部导航栏 -->
            <div class="topbar">
                <h1 class="page-title">文档标题</h1>
                <div class="topbar-actions">
                    <button class="icon-btn" id="toggleTheme" title="切换主题">
                        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <circle cx="12" cy="12" r="5"></circle>
                            <path d="M12 1v2M12 21v2M4.22 4.22l1.42 1.42M18.36 18.36l1.42 1.42M1 12h2M21 12h2M4.22 19.78l1.42-1.42M18.36 5.64l1.42-1.42"></path>
                        </svg>
                    </button>
                </div>
            </div>

            <!-- 进度条 -->
            <div class="progress-container">
                <div class="progress-header">
                    <span class="progress-title">今日背诵进度</span>
                    <span class="progress-percent" id="progressPercent">0%</span>
                </div>
                <div class="progress-bar">
                    <div class="progress-fill" id="progressFill"></div>
                </div>
            </div>

            <!-- 第一章 -->
            <section class="chapter-section active" data-chapter="ch1">
                <div class="chapter-header">
                    <div class="chapter-number">1</div>
                    <h2 class="chapter-title">第一章：章节标题</h2>
                    <span class="chapter-count">N个考点</span>
                </div>

                <!-- 题目解析卡片示例 -->
                <div class="question-card" data-key="q1">
                    <div class="question-header">
                        <span class="question-number">第1题</span>
                        <div class="question-tags">
                            <span class="tag tag-single">单选</span>
                        </div>
                    </div>
                    <div class="question-title">
                        题目题干内容...
                    </div>
                    <ul class="options-list">
                        <li class="option-item correct">
                            <span class="option-label">A.</span>
                            <span class="option-text">正确选项内容</span>
                        </li>
                        <li class="option-item">
                            <span class="option-label">B.</span>
                            <span class="option-text">错误选项内容</span>
                        </li>
                        <li class="option-item">
                            <span class="option-label">C.</span>
                            <span class="option-text">错误选项内容</span>
                        </li>
                        <li class="option-item">
                            <span class="option-label">D.</span>
                            <span class="option-text">错误选项内容</span>
                        </li>
                    </ul>
                    <div class="answer-section">
                        <div class="answer-label">【答案】</div>
                        <div class="answer-content">
                            <strong>A</strong>
                        </div>
                        <div class="analysis-section">
                            <div class="analysis-label">【解析】</div>
                            <div class="analysis-content">
                                考点解析内容...
                            </div>
                        </div>
                    </div>
                </div>

                <!-- 更多题目卡片... -->
            </section>

            <!-- 第二章 -->
            <section class="chapter-section" data-chapter="ch2">
                <div class="chapter-header">
                    <div class="chapter-number">2</div>
                    <h2 class="chapter-title">第二章：章节标题</h2>
                    <span class="chapter-count">N个考点</span>
                </div>

                <!-- 题目卡片... -->
            </section>
        </main>
    </div>

    <script src="../assets/js/app.js"></script>
    <script>
        // 初始化应用
        // docId: 必填，每个文档使用唯一的ID，用于区分不同文档的记忆状态
        document.addEventListener('DOMContentLoaded', function() {
            initApp({ docId: 'your-doc-id' });
        });
    </script>
</body>
</html>
