<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>知识卡片 - 首页</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@300;400;500;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="assets/css/styles.css">
    <style>
        /* Homepage Specific Styles */
        .home-container {
            min-height: 100vh;
            padding: 40px;
            max-width: 1200px;
            margin: 0 auto;
        }

        .home-header {
            text-align: center;
            margin-bottom: 60px;
            padding: 60px 0;
        }

        .home-logo {
            width: 80px;
            height: 80px;
            background: linear-gradient(135deg, var(--accent-primary), var(--accent-secondary));
            border-radius: 24px;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 24px;
            font-size: 36px;
        }

        .home-title {
            font-size: 42px;
            font-weight: 700;
            color: var(--text-primary);
            margin-bottom: 12px;
        }

        .home-subtitle {
            font-size: 16px;
            color: var(--text-muted);
            margin-bottom: 32px;
        }

        .home-stats {
            display: flex;
            justify-content: center;
            gap: 48px;
        }

        .home-stat {
            text-align: center;
        }

        .home-stat-number {
            font-size: 36px;
            font-weight: 700;
            color: var(--accent-primary);
            font-family: var(--font-mono);
        }

        .home-stat-label {
            font-size: 14px;
            color: var(--text-muted);
            margin-top: 4px;
        }

        .docs-section {
            margin-bottom: 48px;
        }

        .docs-section-title {
            font-size: 20px;
            font-weight: 600;
            color: var(--text-primary);
            margin-bottom: 24px;
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .docs-section-title::after {
            content: '';
            flex: 1;
            height: 1px;
            background: var(--border);
        }

        .docs-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
            gap: 24px;
        }

        .doc-card {
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: var(--radius-lg);
            padding: 28px;
            transition: all 0.3s ease;
            cursor: pointer;
            position: relative;
            overflow: hidden;
        }

        .doc-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 4px;
            background: linear-gradient(90deg, var(--accent-primary), var(--accent-secondary));
            transform: scaleX(0);
            transition: transform 0.3s ease;
        }

        .doc-card:hover {
            transform: translateY(-4px);
            box-shadow: var(--shadow-lg);
            border-color: var(--accent-primary);
        }

        .doc-card:hover::before {
            transform: scaleX(1);
        }

        .doc-card-icon {
            width: 48px;
            height: 48px;
            background: linear-gradient(135deg, var(--accent-primary), var(--accent-secondary));
            border-radius: var(--radius-md);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 24px;
            margin-bottom: 16px;
        }

        .doc-card-title {
            font-size: 18px;
            font-weight: 600;
            color: var(--text-primary);
            margin-bottom: 8px;
        }

        .doc-card-desc {
            font-size: 14px;
            color: var(--text-muted);
            margin-bottom: 16px;
            line-height: 1.6;
        }

        .doc-card-meta {
            display: flex;
            align-items: center;
            gap: 16px;
            font-size: 13px;
            color: var(--text-muted);
        }

        .doc-card-badge {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            padding: 4px 12px;
            background: var(--bg-primary);
            border-radius: 20px;
            font-size: 12px;
        }

        .doc-card-badge svg {
            width: 14px;
            height: 14px;
        }

        .home-footer {
            text-align: center;
            padding: 40px 0;
            color: var(--text-muted);
            font-size: 14px;
            border-top: 1px solid var(--border);
            margin-top: 60px;
        }

        .home-footer a {
            color: var(--accent-primary);
            text-decoration: none;
        }

        .home-footer a:hover {
            text-decoration: underline;
        }

        /* Theme Toggle */
        .theme-toggle-fixed {
            position: fixed;
            top: 20px;
            right: 20px;
            z-index: 1000;
        }

        @media (max-width: 768px) {
            .home-container {
                padding: 20px;
            }
            .home-header {
                padding: 40px 0;
            }
            .home-title {
                font-size: 28px;
            }
            .home-stats {
                gap: 24px;
            }
            .home-stat-number {
                font-size: 28px;
            }
            .docs-grid {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>
    <!-- Theme Toggle Button -->
    <div class="theme-toggle-fixed">
        <button class="icon-btn" id="toggleTheme" title="切换主题">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <circle cx="12" cy="12" r="5"></circle>
                <path d="M12 1v2M12 21v2M4.22 4.22l1.42 1.42M18.36 18.36l1.42 1.42M1 12h2M21 12h2M4.22 19.78l1.42-1.42M18.36 5.64l1.42-1.42"></path>
            </svg>
        </button>
    </div>

    <div class="home-container">
        <!-- Header -->
        <header class="home-header">
            <div class="home-logo">📚</div>
            <h1 class="home-title">知识卡片</h1>
            <p class="home-subtitle">高效学习知识点，随时随地背诵记忆</p>
            <div class="home-stats">
                <div class="home-stat">
                    <div class="home-stat-number" id="totalDocs">0</div>
                    <div class="home-stat-label">知识文档</div>
                </div>
                <div class="home-stat">
                    <div class="home-stat-number" id="totalCards">0</div>
                    <div class="home-stat-label">知识卡片</div>
                </div>
            </div>
        </header>

        <!-- Documents List -->
        <section class="docs-section">
            <h2 class="docs-section-title">知识文档</h2>
            <div class="docs-grid" id="docsGrid">
                <!-- 文档卡片将通过JS动态生成 -->
            </div>
        </section>

        <!-- Footer -->
        <footer class="home-footer">
            <p>点击任意卡片开始学习</p>
            <p style="margin-top: 8px;">Powered by <a href="#">Knowledge Cards</a></p>
        </footer>
    </div>

    <script src="assets/js/app.js"></script>
    <script>
        // 文档配置 - 在此添加新文档
        const docsConfig = [
            {
                id: '2025-tianjin-community-v2',
                title: '2025年天津社区工作者笔试真题',
                description: '包含 110 个知识点',
                icon: '📝',
                href: 'docs/2025年天津社区工作者笔试真题-完整版v2.html',
                cards: 110
            },
            {
                id: 'community-knowledge',
                title: '社区知识14页必背',
                description: '社区工作者考试必背知识点，包含公共管理、社区工作、居民自治、社区组织等核心内容。',
                icon: '🏘️',
                href: 'docs/社区知识.html',
                cards: 47
            }
        ];

        // 渲染文档卡片
        function renderDocs() {
            const grid = document.getElementById('docsGrid');
            let totalCards = 0;

            docsConfig.forEach(doc => {
                totalCards += doc.cards;

                const card = document.createElement('a');
                card.className = 'doc-card';
                card.href = doc.href;
                card.innerHTML = `
                    <div class="doc-card-icon">${doc.icon}</div>
                    <h3 class="doc-card-title">${doc.title}</h3>
                    <p class="doc-card-desc">${doc.description}</p>
                    <div class="doc-card-meta">
                        <span class="doc-card-badge">
                            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                <rect x="3" y="4" width="18" height="18" rx="2" ry="2"></rect>
                                <line x1="16" y1="2" x2="16" y2="6"></line>
                                <line x1="8" y1="2" x2="8" y2="6"></line>
                                <line x1="3" y1="10" x2="21" y2="10"></line>
                            </svg>
                            ${doc.cards} 个知识点
                        </span>
                    </div>
                `;
                grid.appendChild(card);
            });

            // 更新统计
            document.getElementById('totalDocs').textContent = docsConfig.length;
            document.getElementById('totalCards').textContent = totalCards;
        }

        // 页面加载完成后初始化
        document.addEventListener('DOMContentLoaded', () => {
            renderDocs();
            initApp({ docId: 'home' });
        });
    </script>
</body>
</html>
