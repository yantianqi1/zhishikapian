<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>文档标题 - 知识卡片</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@300;400;500;700;900&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="../assets/css/styles.css">
</head>
<body>
    <div class="app-container">
        <aside class="sidebar" id="sidebar">
            <!-- Logo -->
            <div class="logo">
                <div class="logo-icon">📚</div>
                <div>
                    <div class="logo-text">文档标题</div>
                    <div class="logo-sub">知识卡片</div>
                </div>
            </div>

            <!-- 搜索框 -->
            <div class="search-container">
                <svg class="search-icon" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <circle cx="11" cy="11" r="8"></circle>
                    <path d="m21 21-4.35-4.35"></path>
                </svg>
                <input type="text" class="search-input" placeholder="搜索知识点..." id="searchInput">
            </div>

            <!-- 快速导航 -->
            <nav class="nav-section">
                <div class="nav-title">快速导航</div>
                <a href="../index.html" class="nav-item">
                    <span>🏠</span>
                    <span>返回首页</span>
                </a>
            </nav>

            <!-- 章节导航 - 根据实际章节修改 -->
            <nav class="nav-section">
                <div class="nav-title">章节导航</div>
                <div class="nav-item active" data-chapter="all">
                    <span>📖</span>
                    <span>全部章节</span>
                    <span class="nav-item-badge">N</span>
                </div>
                <div class="nav-item" data-chapter="ch1">
                    <span>🏷️</span>
                    <span>第一章 章节标题</span>
                    <span class="nav-item-badge">N</span>
                </div>
                <div class="nav-item" data-chapter="ch2">
                    <span>🏷️</span>
                    <span>第二章 章节标题</span>
                    <span class="nav-item-badge">N</span>
                </div>
            </nav>

            <!-- 学习进度统计 -->
            <div class="stats-card">
                <div class="stats-title">📊 学习进度</div>
                <div class="stats-grid">
                    <div class="stats-item">
                        <div class="stats-number" id="totalCards">0</div>
                        <div class="stats-label">知识点</div>
                    </div>
                    <div class="stats-item">
                        <div class="stats-number" id="rememberedCards">0</div>
                        <div class="stats-label">已掌握</div>
                    </div>
                </div>
            </div>
        </aside>

        <main class="main-content">
            <!-- 顶部导航栏 -->
            <div class="topbar">
                <h1 class="page-title">文档标题</h1>
                <div class="topbar-actions">
                    <button class="icon-btn" id="toggleTheme" title="切换主题">
                        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <circle cx="12" cy="12" r="5"></circle>
                            <path d="M12 1v2M12 21v2M4.22 4.22l1.42 1.42M18.36 18.36l1.42 1.42M1 12h2M21 12h2M4.22 19.78l1.42-1.42M18.36 5.64l1.42-1.42"></path>
                        </svg>
                    </button>
                </div>
            </div>

            <!-- 进度条 -->
            <div class="progress-container">
                <div class="progress-header">
                    <span class="progress-title">今日背诵进度</span>
                    <span class="progress-percent" id="progressPercent">0%</span>
                </div>
                <div class="progress-bar">
                    <div class="progress-fill" id="progressFill"></div>
                </div>
            </div>

            <!-- 第一章 -->
            <section class="chapter-section active" data-chapter="ch1">
                <div class="chapter-header">
                    <div class="chapter-number">1</div>
                    <h2 class="chapter-title">第一章：章节标题</h2>
                    <span class="chapter-count">N个考点</span>
                </div>

                <!-- 知识卡片示例 -->
                <div class="knowledge-card" data-key="考点key">
                    <div class="remember-checkbox" onclick="toggleRemember(this)">
                        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" style="display:none">
                            <polyline points="20 6 9 17 4 12"></polyline>
                        </svg>
                    </div>
                    <div class="card-header">
                        <h3 class="card-title">考点一：考点标题</h3>
                        <div class="card-tags">
                            <span class="tag tag-single">单选</span>
                            <!-- <span class="tag tag-multi">多选</span> -->
                            <!-- <span class="tag tag-important">重点</span> -->
                        </div>
                    </div>
                    <div class="card-content">
                        <ul>
                            <li><strong>核心：</strong><span class="key-point">关键内容</span></li>
                            <li><span class="highlight">高亮内容</span></li>
                            <li>普通内容</li>
                        </ul>
                    </div>
                </div>

                <!-- 更多知识卡片... -->
            </section>

            <!-- 第二章 -->
            <section class="chapter-section" data-chapter="ch2">
                <div class="chapter-header">
                    <div class="chapter-number">2</div>
                    <h2 class="chapter-title">第二章：章节标题</h2>
                    <span class="chapter-count">N个考点</span>
                </div>

                <!-- 知识卡片... -->
            </section>
        </main>
    </div>

    <script src="../assets/js/app.js"></script>
    <script>
        // 初始化应用
        // docId: 必填，每个文档使用唯一的ID，用于区分不同文档的记忆状态
        document.addEventListener('DOMContentLoaded', function() {
            initApp({ docId: 'your-doc-id' });
        });
    </script>
</body>
</html>
